<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y$L Bank</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- AUTH PAGE -->
    <div id="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <svg width="260" height="104" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <!-- roof -->
                  <polyline points="10,28 30,14 50,28" stroke="#c8f065" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
                  <!-- roof base line -->
                  <line x1="6" y1="28" x2="54" y2="28" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- 4 outer pillars -->
                  <line x1="12" y1="28" x2="12" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="22" y1="28" x2="22" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="38" y1="28" x2="38" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="48" y1="28" x2="48" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- center pillar — solid filled block -->
                  <rect x="26" y="28" width="8" height="20" rx="1" fill="#c8f065"/>
                  <!-- $ carved into center pillar in dark -->
                  <text x="30" y="43" font-family="DM Mono, monospace" font-size="11" font-weight="800" fill="#1a1a2e" text-anchor="middle">$</text>
                  <!-- base line -->
                  <line x1="6" y1="48" x2="54" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- Y$L bold text -->
                  <text x="62" y="44" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#c8f065" letter-spacing="-1">Y$L</text>
                  <!-- BANK lighter text -->
                  <text x="110" y="41" font-family="DM Sans, sans-serif" font-size="20" font-weight="300" fill="#aaaaaa" letter-spacing="1">BANK</text>
                </svg>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN -->
            <div id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="john">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn-primary full-width" onclick="login()">Login</button>
                <div id="login-msg" class="msg"></div>
            </div>

            <!-- REGISTER -->
            <div id="register-form" style="display:none">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="john">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <button class="btn-primary full-width" onclick="register()">Register</button>
                <div id="register-msg" class="msg"></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-page" style="display:none">
        <div class="sidebar">
            <div class="logo">
                <svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <!-- roof -->
                  <polyline points="10,28 30,14 50,28" stroke="#c8f065" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
                  <!-- roof base line -->
                  <line x1="6" y1="28" x2="54" y2="28" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- 4 outer pillars -->
                  <line x1="12" y1="28" x2="12" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="22" y1="28" x2="22" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="38" y1="28" x2="38" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <line x1="48" y1="28" x2="48" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- center pillar — solid filled block -->
                  <rect x="26" y="28" width="8" height="20" rx="1" fill="#c8f065"/>
                  <!-- $ carved into center pillar in dark -->
                  <text x="30" y="43" font-family="DM Mono, monospace" font-size="11" font-weight="800" fill="#1a1a2e" text-anchor="middle">$</text>
                  <!-- base line -->
                  <line x1="6" y1="48" x2="54" y2="48" stroke="#c8f065" stroke-width="2.5" stroke-linecap="round"/>
                  <!-- Y$L bold text -->
                  <text x="62" y="44" font-family="DM Sans, sans-serif" font-size="28" font-weight="500" fill="#c8f065" letter-spacing="-1">Y$L</text>
                  <!-- BANK lighter text -->
                  <text x="110" y="41" font-family="DM Sans, sans-serif" font-size="20" font-weight="300" fill="#aaaaaa" letter-spacing="1">BANK</text>
                </svg>
            </div>
            <nav>
                <button class="nav-btn active" onclick="showSection('dashboard')">Dashboard</button>
                <button class="nav-btn" onclick="showSection('create')">New Account</button>
                <button class="nav-btn" onclick="showSection('deposit')">Deposit</button>
                <button class="nav-btn" onclick="showSection('withdraw')">Withdraw</button>
                <button class="nav-btn" onclick="showSection('transfer')">Transfer</button>
                <button class="nav-btn" onclick="showSection('history')">History</button>
            </nav>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="main">
            <!-- Dashboard -->
            <section id="dashboard" class="section active">
                <div class="page-header">
                    <h1>Accounts</h1>
                    <button class="btn-primary" onclick="loadAccounts()">Refresh</button>
                </div>
                <div id="accounts-grid" class="accounts-grid"></div>
            </section>

            <!-- Create -->
            <section id="create" class="section">
                <div class="page-header"><h1>New Account</h1></div>
                <div class="card form-card">
                    <div class="form-group">
                        <label>Account Holder Name</label>
                        <input type="text" id="create-name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="create-accnum" placeholder="ACC001">
                    </div>
                    <div class="form-group">
                        <label>Opening Balance (₹)</label>
                        <input type="number" id="create-balance" placeholder="1000">
                    </div>
                    <button class="btn-primary" onclick="createAccount()">Create Account</button>
                    <div id="create-msg" class="msg"></div>
                </div>
            </section>

            <!-- Deposit -->
            <section id="deposit" class="section">
                <div class="page-header"><h1>Deposit</h1></div>
                <div class="card form-card">
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="deposit-accnum" placeholder="ACC001">
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="deposit-amount" placeholder="500">
                    </div>
                    <button class="btn-primary" onclick="deposit()">Deposit</button>
                    <div id="deposit-msg" class="msg"></div>
                </div>
            </section>

            <!-- Withdraw -->
            <section id="withdraw" class="section">
                <div class="page-header"><h1>Withdraw</h1></div>
                <div class="card form-card">
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="withdraw-accnum" placeholder="ACC001">
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="withdraw-amount" placeholder="200">
                    </div>
                    <button class="btn-primary" onclick="withdraw()">Withdraw</button>
                    <div id="withdraw-msg" class="msg"></div>
                </div>
            </section>

            <!-- Transfer -->
            <section id="transfer" class="section">
                <div class="page-header"><h1>Transfer</h1></div>
                <div class="card form-card">
                    <div class="form-group">
                        <label>From Account</label>
                        <input type="text" id="transfer-from" placeholder="ACC001">
                    </div>
                    <div class="form-group">
                        <label>To Account</label>
                        <input type="text" id="transfer-to" placeholder="ACC002">
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="transfer-amount" placeholder="300">
                    </div>
                    <button class="btn-primary" onclick="transfer()">Transfer</button>
                    <div id="transfer-msg" class="msg"></div>
                </div>
            </section>

            <!-- History -->
            <section id="history" class="section">
                <div class="page-header"><h1>Transaction History</h1></div>
                <div class="card form-card">
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="history-accnum" placeholder="ACC001">
                    </div>
                    <button class="btn-primary" onclick="loadHistory()">View History</button>
                </div>
                <div id="history-list" class="history-list"></div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
    <footer id="app-footer">
    <p>© 2026 Y$L Bank. All rights reserved.</p>
    <p>Built with Spring Boot · MySQL · JWT · Deployed on Railway</p>
</footer>
</body>
</html>
